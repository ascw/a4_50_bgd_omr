<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Border Cropper (Offline)</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>
<body>
  <div id="root"></div>

  <!-- opencv.js – loaded before Stlite, so it’s available when Python starts -->
  <script async src="https://cdn.jsdelivr.net/npm/opencv.js@4.10.0"
          onload="onOpenCVReady()"></script>

  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
  <script>
    // ------------------------------------------------------------
    // 1.  opencv.js readiness
    // ------------------------------------------------------------
    let openCVReady = false;
    let openCVResolve = null;
    const cvReadyPromise = new Promise(resolve => { openCVResolve = resolve; });

    function onOpenCVReady() {
      cv.onRuntimeInitialized = () => {
        openCVReady = true;
        openCVResolve();
      };
    }
    // Python will call this to wait
    async function waitForOpenCV() {
      await cvReadyPromise;
      return true;
    }
    window.waitForOpenCV = waitForOpenCV;

    // ------------------------------------------------------------
    // 2.  PyMuPDF custom wheel loader (unchanged)
    // ------------------------------------------------------------
    async function loadPyMuPDFWheel() {
      if (window._pymupdf_loaded) return true;
      try {
        console.log("Loading PyMuPDF Pyodide wheel...");
        await pyodide.pyodide_js.loadPackage(
          'https://cdn.jsdelivr.net/npm/@bentopdf/pymupdf-wasm@0.11.16/assets/pymupdf-1.26.3-cp313-none-pyodide_2025_0_wasm32.whl'
        );
        window._pymupdf_loaded = true;
        return true;
      } catch (error) {
        console.error("Failed to load PyMuPDF wheel:", error);
        throw error;
      }
    }
    window.loadPyMuPDFWheel = loadPyMuPDFWheel;

    // ------------------------------------------------------------
    // 3.  Stlite mount
    // ------------------------------------------------------------
    stlite.mount(
      {
        requirements: [
          "numpy",
          "pillow",
          "pandas",
          "openpyxl"
        ],
        entrypoint: "cropper_app.py",
        files: {
          "cropper_app.py": `
import streamlit as st
import numpy as np
import io
import zipfile
from PIL import Image
import js           # JavaScript interop (built‑in Stlite)
import pyodide      # for to_js / to_py

# ------------------------------------------------------------
#  Load PyMuPDF & wait for opencv.js
# ------------------------------------------------------------
def _load_dependencies():
    try:
        # 1. PyMuPDF (custom wheel)
        js.loadPyMuPDFWheel()
        global fitz
        import fitz
        st.write("PyMuPDF loaded.")

        # 2. Wait for opencv.js (already loading from CDN)
        js.waitForOpenCV()
        st.write("OpenCV.js ready.")
        return True
    except Exception as e:
        st.error(f"Failed to load dependencies: {e}")
        st.stop()

_load_dependencies()

st.set_page_config(page_title="PDF Auto Crop", layout="wide")
st.title("📄 Auto Crop PDF Pages (remove thin border)")
st.caption("Detects the rectangular border, corrects perspective, and crops away the border with a small margin.")

# ------------------------------------------------------------
#  Helper: PDF → PIL images (PyMuPDF)
# ------------------------------------------------------------
def pdf_to_images(pdf_bytes, dpi=300):
    doc = fitz.open(stream=pdf_bytes, filetype="pdf")
    images = []
    zoom = dpi / 72.0
    mat = fitz.Matrix(zoom, zoom)
    for page in doc:
        pix = page.get_pixmap(matrix=mat)
        if pix.n == 3:   # RGB
            img = Image.frombytes("RGB", [pix.width, pix.height], pix.samples)
        elif pix.n == 4: # RGBA → RGB
            img = Image.frombytes("RGBA", [pix.width, pix.height], pix.samples).convert("RGB")
        else:            # grayscale
            img = Image.frombytes("L", [pix.width, pix.height], pix.samples).convert("RGB")
        images.append(img)
    doc.close()
    return images

# ------------------------------------------------------------
#  Border detection & crop using opencv.js
# ------------------------------------------------------------
def detect_and_crop(image_rgb, margin_percent=2.0):
    """Use opencv.js for border detection + perspective warp.
       image_rgb: PIL Image in RGB.
       Returns (cropped_pil, success_flag).
    """
    # Convert PIL → numpy (H, W, 3)
    np_rgb = np.array(image_rgb)
    h, w, _ = np_rgb.shape

    # ---- step 1: convert to OpenCV Mat (4‑channel RGBA? We'll use CV_8UC3) ----
    # Flatten to 1D list
    data = np_rgb.flatten().tolist()   # plain list of numbers
    src_mat = js.cv.matFromArray(h, w, js.cv.CV_8UC3, pyodide.to_js(data))

    # ---- step 2: convert to grayscale ----
    gray = js.cv.Mat()
    js.cv.cvtColor(src_mat, gray, js.cv.COLOR_RGB2GRAY)

    # ---- step 3: edge detection ----
    blurred = js.cv.Mat()
    # Use GaussianBlur (bilateral not available? We'll use Gaussian + Canny)
    js.cv.GaussianBlur(gray, blurred, js.cv.Size(5, 5), 0)
    edges = js.cv.Mat()
    js.cv.Canny(blurred, edges, 30, 100)

    # ---- step 4: find contours ----
    contours = js.cv.MatVector()
    hierarchy = js.cv.Mat()
    js.cv.findContours(edges, contours, hierarchy, js.cv.RETR_EXTERNAL, js.cv.CHAIN_APPROX_SIMPLE)

    if contours.size() == 0:
        # cleanup and return original
        src_mat.delete(); gray.delete(); blurred.delete(); edges.delete();
        contours.delete(); hierarchy.delete()
        return image_rgb, False

    # ---- step 5: find largest quadrilateral ----
    best_quad = None
    max_area = 0.0
    img_area = h * w

    for i in range(contours.size()):
        cnt = contours.get(i)
        area = js.cv.contourArea(cnt)
        if area < 0.3 * img_area:
            continue
        # approximate polygon
        peri = js.cv.arcLength(cnt, True)
        approx = js.cv.Mat()
        js.cv.approxPolyDP(cnt, approx, 0.02 * peri, True)
        if approx.rows == 4 and area > max_area:
            max_area = area
            if best_quad is not None:
                best_quad.delete()
            best_quad = approx.clone()
        approx.delete()

    if best_quad is None:
        # cleanup
        src_mat.delete(); gray.delete(); blurred.delete(); edges.delete();
        contours.delete(); hierarchy.delete()
        return image_rgb, False

    # ---- step 6: order points (top‑left, top‑right, bottom‑right, bottom‑left) ----
    pts = []
    for r in range(4):
        pts.append([best_quad.data32F[r*2], best_quad.data32F[r*2+1]])
    pts = np.array(pts, dtype=np.float32)
    # simple order
    s = pts.sum(axis=1)
    tl = pts[np.argmin(s)]
    br = pts[np.argmax(s)]
    diff = np.diff(pts, axis=1)
    tr = pts[np.argmin(diff)]
    bl = pts[np.argmax(diff)]

    width_top = np.linalg.norm(tr - tl)
    width_bot = np.linalg.norm(br - bl)
    max_w = int(max(width_top, width_bot))
    height_left = np.linalg.norm(bl - tl)
    height_right = np.linalg.norm(br - tr)
    max_h = int(max(height_left, height_right))

    # Build destination matrices
    src_pts = js.cv.matFromArray(4, 2, js.cv.CV_32F, pyodide.to_js(
        [tl[0], tl[1], tr[0], tr[1], br[0], br[1], bl[0], bl[1]]
    ))
    dst_pts = js.cv.matFromArray(4, 2, js.cv.CV_32F, pyodide.to_js(
        [0, 0, max_w-1, 0, max_w-1, max_h-1, 0, max_h-1]
    ))

    transform = js.cv.getPerspectiveTransform(src_pts, dst_pts)
    warped = js.cv.Mat()
    js.cv.warpPerspective(src_mat, warped, transform, js.cv.Size(max_w, max_h))

    # ---- step 7: crop margin ----
    margin_x = int(max_w * margin_percent / 100)
    margin_y = int(max_h * margin_percent / 100)
    margin_x = min(margin_x, max_w // 4)
    margin_y = min(margin_y, max_h // 4)

    # Convert warped Mat to numpy
    warped_data = warped.data.to_py()   # returns memoryview, convert to bytes
    warped_array = np.frombuffer(warped_data, dtype=np.uint8).reshape(max_h, max_w, 3)
    # Crop
    cropped_array = warped_array[margin_y:max_h-margin_y, margin_x:max_w-margin_x]

    # ---- step 8: clean up all Mats ----
    src_mat.delete(); gray.delete(); blurred.delete(); edges.delete();
    contours.delete(); hierarchy.delete(); best_quad.delete()
    src_pts.delete(); dst_pts.delete(); transform.delete(); warped.delete()

    # Return PIL image
    cropped_pil = Image.fromarray(cropped_array)
    return cropped_pil, True

# ------------------------------------------------------------
#  UI (same as before)
# ------------------------------------------------------------
st.subheader("1. Upload PDF")
pdf_file = st.file_uploader("Choose a PDF file", type="pdf")
margin = st.slider("Crop margin (%)", 0.0, 10.0, 2.0, 0.5,
                   help="How much to shrink the detected area inside the border to remove the line itself.")

if pdf_file:
    pdf_bytes = pdf_file.read()
    try:
        pages = pdf_to_images(pdf_bytes, dpi=300)
    except Exception as e:
        st.error(f"Failed to process PDF: {e}")
        st.stop()

    st.success(f"Loaded {len(pages)} page(s).")
    max_pages = st.number_input("Pages to process", 1, len(pages), len(pages))
    pages = pages[:max_pages]

    cropped_pages = []
    status = []
    for i, page_img in enumerate(pages):
        st.write(f"Processing page {i+1}...")
        cropped, ok = detect_and_crop(page_img, margin)
        if ok:
            cropped_pages.append(cropped)
            status.append("✓ cropped")
        else:
            cropped_pages.append(page_img)
            status.append("⚠ border not found – kept original")

    st.subheader("Preview (first page)")
    col1, col2 = st.columns(2)
    with col1:
        st.image(pages[0], caption="Original", width='stretch')
    with col2:
        st.image(cropped_pages[0], caption=f"Cropped ({status[0]})", width='stretch')

    st.subheader("Download Results")
    zip_buf = io.BytesIO()
    with zipfile.ZipFile(zip_buf, "w") as zf:
        for idx, img in enumerate(cropped_pages):
            buf = io.BytesIO()
            img.save(buf, format="PNG")
            zf.writestr(f"page_{idx+1:03d}.png", buf.getvalue())
    zip_buf.seek(0)
    st.download_button("Download cropped images (ZIP)", zip_buf,
                       "cropped_pages.zip", "application/zip")

    pdf_buf = io.BytesIO()
    if cropped_pages:
        rgb_pages = [img.convert("RGB") for img in cropped_pages]
        rgb_pages[0].save(pdf_buf, "PDF", save_all=True, append_images=rgb_pages[1:])
        pdf_buf.seek(0)
        st.download_button("Download cropped pages (PDF)", pdf_buf,
                           "cropped_pages.pdf", "application/pdf")
          `
        }
      },
      document.getElementById("root")
    );
  </script>
</body>
</html>
