<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Border Cropper (Diagnostic)</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .preview { display: flex; gap: 1rem; flex-wrap: wrap; }
    .preview img { max-width: 45%; border: 1px solid #ccc; }
    button { margin: 0.5rem 0; padding: 0.5rem 1rem; }
    #status { color: blue; margin: 1rem 0; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📄 Auto Crop PDF Pages (Diagnostic)</h1>
  <p>Watch the status messages below. Open the console (F12) as well.</p>

  <div>
    <label for="marginSlider">Crop margin (%): <span id="marginValue">2</span></label>
    <input type="range" id="marginSlider" min="0" max="10" step="0.5" value="2" />
  </div>

  <input type="file" id="pdfUpload" accept=".pdf" />
  <br/>
  <button id="processBtn" disabled>Process PDF</button>

  <div id="status">
    <span id="statusPdfjs">⏳ pdf.js: loading…</span><br/>
    <span id="statusOpencv">⏳ opencv.js: loading…</span><br/>
    <span id="statusGlobal">Waiting for PDF upload…</span>
  </div>

  <div id="preview" class="preview"></div>
  <div id="downloads" style="margin-top:1rem;"></div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"
          onload="document.getElementById('statusPdfjs').innerHTML='✅ pdf.js loaded'"
          onerror="document.getElementById('statusPdfjs').innerHTML='❌ pdf.js failed'"></script>
  <script async src="https://cdn.jsdelivr.net/npm/opencv.js@4.10.0" onload="onOpenCVScriptLoad()"></script>

  <script>
    // ---------- Global state ----------
    let openCVReady = false;
    let pdfBytes = null;

    // pdf.js worker
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
      console.log('pdfjsLib configured.');
    } else {
      document.getElementById('statusPdfjs').innerHTML = '❌ pdfjsLib not defined after script load';
    }

    // When opencv.js script tag loads, set up runtime callback
    function onOpenCVScriptLoad() {
      console.log('opencv.js script loaded, waiting for runtime...');
      if (typeof cv !== 'undefined') {
        cv['onRuntimeInitialized'] = () => {
          openCVReady = true;
          document.getElementById('statusOpencv').innerHTML = '✅ opencv.js ready';
          console.log('OpenCV runtime ready.');
        };
        // If it's already initialized (unlikely), handle that
        if (cv.Mat) {
          openCVReady = true;
          document.getElementById('statusOpencv').innerHTML = '✅ opencv.js ready (already)';
        }
      } else {
        document.getElementById('statusOpencv').innerHTML = '❌ cv object missing';
      }
    }

    // UI elements
    const upload = document.getElementById('pdfUpload');
    const processBtn = document.getElementById('processBtn');
    const marginSlider = document.getElementById('marginSlider');
    const marginValue = document.getElementById('marginValue');
    const statusGlobal = document.getElementById('statusGlobal');
    const previewDiv = document.getElementById('preview');
    const downloadsDiv = document.getElementById('downloads');

    marginSlider.oninput = () => marginValue.textContent = marginSlider.value;

    upload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      statusGlobal.innerHTML = 'Reading PDF file…';
      const reader = new FileReader();
      reader.onload = (ev) => {
        pdfBytes = new Uint8Array(ev.target.result);
        statusGlobal.innerHTML = 'PDF loaded. Checking libraries…';
        checkReady();
      };
      reader.readAsArrayBuffer(file);
    });

    function checkReady() {
      const pdfOk = typeof pdfjsLib !== 'undefined';
      const cvOk = openCVReady;
      if (pdfOk && cvOk) {
        processBtn.disabled = false;
        statusGlobal.innerHTML = '✅ Ready to process.';
      } else {
        processBtn.disabled = true;
        let missing = [];
        if (!pdfOk) missing.push('pdf.js');
        if (!cvOk) missing.push('opencv.js');
        statusGlobal.innerHTML = `⏳ Waiting for: ${missing.join(', ')}`;
        // Retry after 1 second
        setTimeout(checkReady, 1000);
      }
    }

    // ---------- Core functions (same as before) ----------
    async function renderPages(pdfBytes) {
      console.log('Starting PDF rendering…');
      const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
      const pdf = await loadingTask.promise;
      const pages = [];
      const scale = 300 / 72;
      for (let i = 1; i <= pdf.numPages; i++) {
        console.log(`Rendering page ${i}/${pdf.numPages}…`);
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        pages.push({
          width: canvas.width,
          height: canvas.height,
          data: imageData.data
        });
      }
      console.log('PDF rendering complete.');
      return pages;
    }

    async function detectAndCrop(width, height, imageData, marginPercent) {
      console.log('Starting border detection…');
      let src = cv.matFromArray(height, width, cv.CV_8UC4, imageData);
      let gray = new cv.Mat(); cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      let blurred = new cv.Mat(); cv.GaussianBlur(gray, blurred, new cv.Size(5,5), 0);
      let edges = new cv.Mat(); cv.Canny(blurred, edges, 30, 100);
      let contours = new cv.MatVector(); let hierarchy = new cv.Mat();
      cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      let success = false;
      let resultWidth = width, resultHeight = height;
      let resultData = imageData;

      if (contours.size() > 0) {
        let bestQuad = null, maxArea = 0;
        const imgArea = width * height;
        for (let i = 0; i < contours.size(); i++) {
          let cnt = contours.get(i);
          let area = cv.contourArea(cnt);
          if (area < 0.3 * imgArea) continue;
          let peri = cv.arcLength(cnt, true);
          let approx = new cv.Mat();
          cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
          if (approx.rows == 4 && area > maxArea) {
            maxArea = area;
            if (bestQuad) bestQuad.delete();
            bestQuad = approx.clone();
          }
          approx.delete();
        }
        if (bestQuad) {
          let pts = [];
          for (let r=0; r<4; r++) pts.push({x:bestQuad.data32F[r*2], y:bestQuad.data32F[r*2+1]});
          pts.sort((a,b)=> a.y - b.y || a.x - b.x);
          let tl=pts[0], tr=pts[1], br=pts[3], bl=pts[2];
          if (tl.x>tr.x) [tl,tr]=[tr,tl];
          if (bl.x>br.x) [bl,br]=[br,bl];
          const maxW = Math.max(Math.hypot(tr.x-tl.x, tr.y-tl.y), Math.hypot(br.x-bl.x, br.y-bl.y))|0;
          const maxH = Math.max(Math.hypot(bl.x-tl.x, bl.y-tl.y), Math.hypot(br.x-tr.x, br.y-tr.y))|0;
          let srcPts = cv.matFromArray(4,2,cv.CV_32F, [tl.x,tl.y, tr.x,tr.y, br.x,br.y, bl.x,bl.y]);
          let dstPts = cv.matFromArray(4,2,cv.CV_32F, [0,0, maxW-1,0, maxW-1,maxH-1, 0,maxH-1]);
          let transform = cv.getPerspectiveTransform(srcPts, dstPts);
          let warped = new cv.Mat(); cv.warpPerspective(src, warped, transform, new cv.Size(maxW,maxH));
          const mX = Math.min(Math.floor(maxW*marginPercent/100), maxW>>2);
          const mY = Math.min(Math.floor(maxH*marginPercent/100), maxH>>2);
          let roi = new cv.Rect(mX, mY, maxW-mX*2, maxH-mY*2);
          let cropped = warped.roi(roi).clone();
          resultData = new Uint8Array(cropped.data);
          resultWidth = cropped.cols; resultHeight = cropped.rows;
          success = true;
          srcPts.delete(); dstPts.delete(); transform.delete(); warped.delete(); cropped.delete();
          bestQuad.delete();
        }
      }
      src.delete(); gray.delete(); blurred.delete(); edges.delete();
      contours.delete(); hierarchy.delete();
      console.log('Border detection done, success:', success);
      return { success, width: resultWidth, height: resultHeight, data: resultData };
    }

    function rgbaToBlob(width, height, data) {
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(width, height);
      imageData.data.set(data);
      ctx.putImageData(imageData, 0, 0);
      return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    }

    // ---------- Process button ----------
    processBtn.addEventListener('click', async () => {
      if (!pdfBytes) return;
      processBtn.disabled = true;
      statusGlobal.innerHTML = 'Processing… (check console for progress)';
      previewDiv.innerHTML = '';
      downloadsDiv.innerHTML = '';

      try {
        const pages = await renderPages(pdfBytes);
        const margin = parseFloat(marginSlider.value);
        const croppedImages = [];
        const statuses = [];

        for (let i = 0; i < pages.length; i++) {
          statusGlobal.innerHTML = `Processing page ${i+1}/${pages.length}…`;
          const page = pages[i];
          const result = await detectAndCrop(page.width, page.height, page.data, margin);
          if (result.success) {
            croppedImages.push(result);
            statuses.push('✓ cropped');
          } else {
            croppedImages.push(page);
            statuses.push('⚠ no border');
          }
        }

        // Preview first page
        const origBlob = await rgbaToBlob(pages[0].width, pages[0].height, pages[0].data);
        const cropBlob = await rgbaToBlob(croppedImages[0].width, croppedImages[0].height, croppedImages[0].data);
        previewDiv.innerHTML = `
          <div><strong>Original</strong><br><img src="${URL.createObjectURL(origBlob)}" /></div>
          <div><strong>Cropped (${statuses[0]})</strong><br><img src="${URL.createObjectURL(cropBlob)}" /></div>
        `;

        // Downloads
        downloadsDiv.innerHTML = '<strong>Downloads:</strong><br/>';
        const zip = new JSZip();
        for (let i = 0; i < croppedImages.length; i++) {
          const blob = await rgbaToBlob(croppedImages[i].width, croppedImages[i].height, croppedImages[i].data);
          zip.file(`page_${(i+1).toString().padStart(3,'0')}.png`, blob);
        }
        const zipBlob = await zip.generateAsync({type:'blob'});
        const zipUrl = URL.createObjectURL(zipBlob);
        downloadsDiv.innerHTML += `<a href="${zipUrl}" download="cropped_pages.zip">Download ZIP</a><br/>`;

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        for (let i = 0; i < croppedImages.length; i++) {
          const blob = await rgbaToBlob(croppedImages[i].width, croppedImages[i].height, croppedImages[i].data);
          const imgUrl = URL.createObjectURL(blob);
          if (i > 0) pdf.addPage();
          pdf.addImage(imgUrl, 'PNG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
        }
        const pdfBlob = pdf.output('blob');
        const pdfUrl = URL.createObjectURL(pdfBlob);
        downloadsDiv.innerHTML += `<a href="${pdfUrl}" download="cropped_pages.pdf">Download PDF</a>`;

        statusGlobal.innerHTML = `✅ Done. ${pages.length} pages processed.`;

      } catch (err) {
        console.error(err);
        statusGlobal.innerHTML = `<span class="error">Error: ${err.message}</span>`;
      } finally {
        processBtn.disabled = false;
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
