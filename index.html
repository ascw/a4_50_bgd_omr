<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Border Cropper (Offline)</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
  <script>
    async function loadPyMuPDFWheel() {
    if (window._pymupdf_loaded) return true;
    try {
        console.log("Loading PyMuPDF Pyodide wheel...");
        // Use the Pyodide API accessible in Stlite
        await pyodide.pyodide_js.loadPackage(
            'https://cdn.jsdelivr.net/npm/@bentopdf/pymupdf-wasm@0.11.16/assets/pymupdf-1.26.3-cp313-none-pyodide_2025_0_wasm32.whl'
        );
        console.log("PyMuPDF wheel loaded successfully.");
        window._pymupdf_loaded = true;
        return true;
    } catch (error) {
        console.error("Failed to load PyMuPDF wheel:", error);
        throw error;
    }
}
// Make the function globally accessible
window.loadPyMuPDFWheel = loadPyMuPDFWheel;
    async function loadOpenCVWheel() {
      if (window._opencv_loaded) return true;
      try {
        console.log("Loading opencv-python from Pyodide repository...");
        await pyodide.pyodide_js.loadPackage('opencv-python');
        console.log("OpenCV loaded successfully.");
        window._opencv_loaded = true;
        return true;
      } catch (error) {
        console.error("Failed to load OpenCV:", error);
        throw error;
      }
    }
    window.loadOpenCVWheel = loadOpenCVWheel;

    stlite.mount(
      {
        requirements: [
          "numpy",
          "pillow",
          "pandas",         // not really needed for cropper, but harmless
          "openpyxl"        // harmless
        ],
        entrypoint: "cropper_app.py",
        files: {
          "cropper_app.py": `
# -------------------------------------------------------
#  OFFLINE CROPPER APP – paste your modified code here
# -------------------------------------------------------
import streamlit as st
import numpy as np
import io
import zipfile
from PIL import Image
import js  # JavaScript interop (built-in Stlite)

# ---------- Load heavy dependencies before anything else ----------
def _load_dependencies():
    """Load OpenCV and PyMuPDF via their Wasm wheels, then import them."""
    try:
        # 1. OpenCV (official Pyodide package)
        js.loadOpenCVWheel()
        global cv2
        import cv2
        st.write("OpenCV loaded.")

        # 2. PyMuPDF (custom wheel)
        js.loadPyMuPDFWheel()
        global fitz
        import fitz
        st.write("PyMuPDF loaded.")
        return True
    except Exception as e:
        st.error(f"Failed to load dependencies: {e}")
        st.stop()

_load_dependencies()

st.set_page_config(page_title="PDF Auto Crop", layout="wide")
st.title("📄 Auto Crop PDF Pages (remove thin border)")
st.caption("Detects the rectangular border, corrects perspective, and crops away the border with a small margin.")

# ---------- helper functions ----------
def pdf_to_images(pdf_bytes, dpi=300):
    """Convert PDF bytes to list of RGB PIL images using PyMuPDF."""
    doc = fitz.open(stream=pdf_bytes, filetype="pdf")
    images = []
    zoom = dpi / 72.0
    mat = fitz.Matrix(zoom, zoom)
    for page in doc:
        pix = page.get_pixmap(matrix=mat)
        if pix.n == 3:   # RGB
            img = Image.frombytes("RGB", [pix.width, pix.height], pix.samples)
        elif pix.n == 4: # RGBA -> RGB
            img = Image.frombytes("RGBA", [pix.width, pix.height], pix.samples).convert("RGB")
        else:            # grayscale
            img = Image.frombytes("L", [pix.width, pix.height], pix.samples).convert("RGB")
        images.append(img)
    doc.close()
    return images

def detect_and_crop(image_rgb, margin_percent=2.0):
    """
    Detect the largest quadrilateral (the thin border), perform perspective correction,
    then crop inward by margin_percent to remove the border itself.
    Returns (cropped_rgb, success_flag).
    """
    # Convert to OpenCV BGR
    img = cv2.cvtColor(np.array(image_rgb), cv2.COLOR_RGB2BGR)
    gray = cv2.cvtColor(img, cv2.COLOR_BGR2GRAY)

    # Edge detection – adjust thresholds for thin lines
    blurred = cv2.bilateralFilter(gray, 9, 75, 75)
    edges = cv2.Canny(blurred, 30, 100)

    # Find contours
    contours, _ = cv2.findContours(edges, cv2.RETR_EXTERNAL, cv2.CHAIN_APPROX_SIMPLE)
    if not contours:
        return image_rgb, False

    # Sort by area descending, look for a large quadrilateral
    contours = sorted(contours, key=cv2.contourArea, reverse=True)
    best_quad = None
    for c in contours:
        peri = cv2.arcLength(c, True)
        approx = cv2.approxPolyDP(c, 0.02 * peri, True)
        if len(approx) == 4:
            # Check area – should be > 30% of image area to be the border
            area = cv2.contourArea(approx)
            img_area = gray.shape[0] * gray.shape[1]
            if area > 0.3 * img_area:
                best_quad = approx.reshape(4, 2).astype(np.float32)
                break

    if best_quad is None:
        return image_rgb, False

    # Order points: top-left, top-right, bottom-right, bottom-left
    rect = np.zeros((4, 2), dtype="float32")
    s = best_quad.sum(axis=1)
    rect[0] = best_quad[np.argmin(s)]
    rect[2] = best_quad[np.argmax(s)]
    diff = np.diff(best_quad, axis=1)
    rect[1] = best_quad[np.argmin(diff)]
    rect[3] = best_quad[np.argmax(diff)]

    # Compute output dimensions (maintain aspect ratio of the original shape)
    (tl, tr, br, bl) = rect
    width_top = np.linalg.norm(tr - tl)
    width_bot = np.linalg.norm(br - bl)
    max_w = int(max(width_top, width_bot))
    height_left = np.linalg.norm(bl - tl)
    height_right = np.linalg.norm(br - tr)
    max_h = int(max(height_left, height_right))

    # Perspective transform
    dst = np.array([
        [0, 0],
        [max_w - 1, 0],
        [max_w - 1, max_h - 1],
        [0, max_h - 1]
    ], dtype="float32")
    M = cv2.getPerspectiveTransform(rect, dst)
    warped = cv2.warpPerspective(img, M, (max_w, max_h))

    # Crop inward by margin_percent to remove the border line
    h, w = warped.shape[:2]
    margin_x = int(w * margin_percent / 100)
    margin_y = int(h * margin_percent / 100)
    # Ensure we don't crop too much
    margin_x = min(margin_x, w // 4)
    margin_y = min(margin_y, h // 4)
    cropped = warped[margin_y:h - margin_y, margin_x:w - margin_x]

    # Return as RGB image (PIL)
    cropped_rgb = cv2.cvtColor(cropped, cv2.COLOR_BGR2RGB)
    return Image.fromarray(cropped_rgb), True

# ---------- UI ----------
st.subheader("1. Upload PDF")
pdf_file = st.file_uploader("Choose a PDF file", type="pdf")
margin = st.slider("Crop margin (%)", 0.0, 10.0, 2.0, 0.5,
                   help="How much to shrink the detected area inside the border to remove the line itself.")

if pdf_file:
    pdf_bytes = pdf_file.read()
    try:
        pages = pdf_to_images(pdf_bytes, dpi=300)
    except Exception as e:
        st.error(f"Failed to process PDF: {e}")
        st.stop()

    st.success(f"Loaded {len(pages)} page(s).")
    max_pages = st.number_input("Pages to process", 1, len(pages), len(pages))
    pages = pages[:max_pages]

    # Process pages
    cropped_pages = []
    status = []
    for i, page_img in enumerate(pages):
        st.write(f"Processing page {i+1}...")
        cropped, ok = detect_and_crop(page_img, margin)
        if ok:
            cropped_pages.append(cropped)
            status.append("✓ cropped")
        else:
            cropped_pages.append(page_img)  # fallback: original
            status.append("⚠ border not found – kept original")

    # Show preview of first page
    st.subheader("Preview (first page)")
    col1, col2 = st.columns(2)
    with col1:
        st.image(pages[0], caption="Original", width='stretch')
    with col2:
        st.image(cropped_pages[0], caption=f"Cropped ({status[0]})", width='stretch')

    # Download options
    st.subheader("Download Results")
    # ZIP of cropped images
    zip_buf = io.BytesIO()
    with zipfile.ZipFile(zip_buf, "w") as zf:
        for idx, img in enumerate(cropped_pages):
            buf = io.BytesIO()
            img.save(buf, format="PNG")
            zf.writestr(f"page_{idx+1:03d}.png", buf.getvalue())
    zip_buf.seek(0)
    st.download_button("Download cropped images (ZIP)", zip_buf,
                       "cropped_pages.zip", "application/zip")

    # Combined PDF (using PIL)
    pdf_buf = io.BytesIO()
    if cropped_pages:
        rgb_pages = [img.convert("RGB") for img in cropped_pages]
        rgb_pages[0].save(pdf_buf, "PDF", save_all=True, append_images=rgb_pages[1:])
        pdf_buf.seek(0)
        st.download_button("Download cropped pages (PDF)", pdf_buf,
                           "cropped_pages.pdf", "application/pdf")
          `
        }
      },
      document.getElementById("root")
    );
  </script>
</body>
</html>
