<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Border Cropper (Offline)</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
  <script>
    stlite.mount(
      {
        requirements: [
          "numpy",
          "pillow"   // no pandas or openpyxl needed for the cropper
        ],
        entrypoint: "cropper_app.py",
        files: {
          "cropper_app.py": `
import streamlit as st
from PIL import Image
import js
import numpy as np
import io
import zipfile

st.set_page_config(page_title="PDF Auto Crop", layout="wide")
st.title("📄 Auto Crop PDF Pages (remove thin border)")
st.caption("Uses pdf.js + opencv.js, fully offline.")

# ---------- Helpers to convert JS data to PIL ----------
def rgba_to_pil(width, height, data_js):
    """Convert a JS Uint8Array (RGBA) to a PIL Image (RGB)."""
    buf = data_js.to_py()
    img = Image.frombytes("RGBA", (width, height), buf).convert("RGB")
    return img

# ---------- UI ----------
margin = st.slider("Crop margin (%)", 0.0, 10.0, 2.0, 0.5)
pdf_file = st.file_uploader("Choose a PDF file", type="pdf")

if pdf_file:
    pdf_bytes = pdf_file.read()

    # Render pages with pdf.js (returns a JS array of {width, height, data})
    try:
        js_pages = js.renderPDFPages(pdf_bytes)
    except Exception as e:
        st.error(f"PDF rendering failed: {e}")
        st.stop()

    n_pages = len(js_pages)
    st.success(f"Loaded {n_pages} page(s).")
    # Convert to PIL images for preview
    pil_pages = [rgba_to_pil(p.width, p.height, p.data) for p in js_pages]

    max_pages = st.number_input("Pages to process", 1, n_pages, n_pages)
    pil_pages = pil_pages[:max_pages]

    # Process each page
    cropped_pages = []
    status = []
    for i, pil_img in enumerate(pil_pages):
        st.write(f"Processing page {i+1}...")
        # Convert PIL image to RGBA Uint8Array for opencv.js
        np_rgba = np.array(pil_img.convert("RGBA"))
        data_js = js.Uint8Array.new(np_rgba.flatten().tolist())
        result = js.detectAndCrop(pil_img.width, pil_img.height, data_js, margin)
        if result.success:
            cropped_pil = rgba_to_pil(result.width, result.height, result.data)
            cropped_pages.append(cropped_pil)
            status.append("✓ cropped")
        else:
            cropped_pages.append(pil_img)
            status.append("⚠ border not found – kept original")

    # Preview
    st.subheader("Preview (first page)")
    col1, col2 = st.columns(2)
    with col1:
        st.image(pil_pages[0], caption="Original", width='stretch')
    with col2:
        st.image(cropped_pages[0], caption=f"Cropped ({status[0]})", width='stretch')

    # Downloads
    st.subheader("Download Results")
    zip_buf = io.BytesIO()
    with zipfile.ZipFile(zip_buf, "w") as zf:
        for idx, img in enumerate(cropped_pages):
            buf = io.BytesIO()
            img.save(buf, format="PNG")
            zf.writestr(f"page_{idx+1:03d}.png", buf.getvalue())
    zip_buf.seek(0)
    st.download_button("Download cropped images (ZIP)", zip_buf,
                       "cropped_pages.zip", "application/zip")

    pdf_buf = io.BytesIO()
    if cropped_pages:
        rgb_images = [img.convert("RGB") for img in cropped_pages]
        rgb_images[0].save(pdf_buf, "PDF", save_all=True, append_images=rgb_images[1:])
        pdf_buf.seek(0)
        st.download_button("Download cropped pages (PDF)", pdf_buf,
                           "cropped_pages.pdf", "application/pdf")
          `
        },
        pyodideReady: function (pyodide) {
          // This runs inside the Web Worker – we can now load JS libraries
          // directly into the worker’s global scope.

          // 1. Load pdf.js (it will attach 'pdfjsLib' to self)
          importScripts('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
          pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

          // 2. Load opencv.js (it’s async, so we wrap it in a promise)
          const loadOpenCV = new Promise((resolve) => {
            importScripts('https://cdn.jsdelivr.net/npm/opencv.js@4.10.0');
            cv['onRuntimeInitialized'] = () => {
              resolve();
            };
          });

          // 3. Define the helper functions (will be available to Python via js.)
          //    PDF rendering helper
          self.renderPDFPages = async function (pdfBytes) {
            const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
            const pdf = await loadingTask.promise;
            const pages = [];

            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const vp = page.getViewport({ scale: 300 / 72 }); // 300 DPI
              const canvas = new OffscreenCanvas(vp.width, vp.height);
              const ctx = canvas.getContext('2d');
              await page.render({ canvasContext: ctx, viewport: vp }).promise;
              const imgData = ctx.getImageData(0, 0, vp.width, vp.height);
              pages.push({
                width: imgData.width,
                height: imgData.height,
                data: imgData.data   // Uint8ClampedArray (RGBA)
              });
            }
            return pages;
          };

          //    Border detection + crop helper
          //    We'll wait for OpenCV to be ready before using it
          self.detectAndCrop = async function (width, height, data, marginPercent) {
            await loadOpenCV;  // ensures cv is ready
            // data is a Uint8ClampedArray (RGBA)
            let src = cv.matFromArray(height, width, cv.CV_8UC4, data);

            // Grayscale + edge detection
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            let blurred = new cv.Mat();
            cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
            let edges = new cv.Mat();
            cv.Canny(blurred, edges, 30, 100);

            // Find contours
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let success = false;
            let croppedData = data;  // fallback
            let croppedW = width, croppedH = height;

            if (contours.size() > 0) {
              // Look for largest quadrilateral
              let bestQuad = null, maxArea = 0;
              const imgArea = width * height;
              for (let i = 0; i < contours.size(); i++) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area < 0.3 * imgArea) continue;
                let peri = cv.arcLength(cnt, true);
                let approx = new cv.Mat();
                cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
                if (approx.rows == 4 && area > maxArea) {
                  maxArea = area;
                  if (bestQuad) bestQuad.delete();
                  bestQuad = approx.clone();
                }
                approx.delete();
              }

              if (bestQuad) {
                // Order points (simple version)
                let pts = [];
                for (let r = 0; r < 4; r++) {
                  pts.push({x: bestQuad.data32F[r*2], y: bestQuad.data32F[r*2+1]});
                }
                pts.sort((a,b) => a.y - b.y || a.x - b.x);
                let tl = pts[0], tr = pts[1], br = pts[3], bl = pts[2];
                if (tl.x > tr.x) [tl, tr] = [tr, tl];
                if (bl.x > br.x) [bl, br] = [br, bl];

                const maxW = Math.max(
                  Math.hypot(tr.x - tl.x, tr.y - tl.y),
                  Math.hypot(br.x - bl.x, br.y - bl.y)
                ) | 0;
                const maxH = Math.max(
                  Math.hypot(bl.x - tl.x, bl.y - tl.y),
                  Math.hypot(br.x - tr.x, br.y - tr.y)
                ) | 0;

                let srcPts = cv.matFromArray(4, 2, cv.CV_32F, [tl.x,tl.y, tr.x,tr.y, br.x,br.y, bl.x,bl.y]);
                let dstPts = cv.matFromArray(4, 2, cv.CV_32F, [0,0, maxW-1,0, maxW-1,maxH-1, 0,maxH-1]);
                let transform = cv.getPerspectiveTransform(srcPts, dstPts);
                let warped = new cv.Mat();
                cv.warpPerspective(src, warped, transform, new cv.Size(maxW, maxH));

                const mX = Math.min(Math.floor(maxW * marginPercent / 100), maxW >> 2);
                const mY = Math.min(Math.floor(maxH * marginPercent / 100), maxH >> 2);
                let rect = new cv.Rect(mX, mY, maxW - mX*2, maxH - mY*2);
                let cropped = warped.roi(rect).clone();  // clone so we can delete warped

                croppedData = new Uint8Array(cropped.data);
                croppedW = cropped.cols;
                croppedH = cropped.rows;
                success = true;

                // cleanup
                srcPts.delete(); dstPts.delete(); transform.delete(); warped.delete(); cropped.delete();
                bestQuad.delete();
              }
            }
            // cleanup
            src.delete(); gray.delete(); blurred.delete(); edges.delete();
            contours.delete(); hierarchy.delete();

            return {
              success: success,
              width: croppedW,
              height: croppedH,
              data: croppedData
            };
          };
        }
      },
      document.getElementById("root")
    );
  </script>
</body>
</html>
